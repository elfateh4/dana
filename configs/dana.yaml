# DANA — Disaster-Aware Neural Algorithm
# Experiment configuration

model:
  embedding_dim: 128
  num_encoder_layers: 12
  num_decoder_layers: 1   # RRNCO decoder: single-query MHA block
  num_heads: 8
  feedforward_dim: 512
  dropout: 0.1
  sample_k: 25            # inverse-distance sampling (RRNCO Eq. 4, k=25)
  edge_dim: 16            # per-edge embedding dim for Neural Adaptive Bias

training:
  batch_size: 256
  num_epochs: 100
  instances_per_epoch: 100000
  learning_rate: 1.0e-4
  weight_decay: 1.0e-6
  lr_scheduler: cosine
  warmup_steps: 1000
  max_grad_norm: 1.0
  entropy_beta: 0.01

pomo:
  num_starts: 8
  num_augmentations: 8   # dihedral x8 augmentation (RRNCO testing protocol)

reward:
  alpha_response: 0.4
  beta_satisfaction: 0.3
  gamma_equity: 0.2
  delta_violation: 0.1

environment:
  max_vehicles: 10
  vehicle_capacity: 200
  time_horizon: 480  # minutes (8 hours)
  disaster_probability: 0.05  # per step
  max_depots: 5

data:
  osm_cities:
    train:
      - "cairo"
      - "alexandria"
      - "giza"
      - "lagos"
      - "nairobi"
      - "mumbai"
      - "jakarta"
      - "manila"
      - "mexico_city"
      - "sao_paulo"
      - "istanbul"
      - "tehran"
      - "baghdad"
      - "dhaka"
      - "karachi"
      - "addis_ababa"
      - "kinshasa"
      - "luanda"
      - "accra"
      - "dakar"
    val:
      - "cape_town"
      - "casablanca"
      - "riyadh"
      - "algiers"
      - "tripoli"
    test:
      - "rome"
      - "madrid"
      - "tokyo"
      - "new_york"
      - "london"
      - "paris"
      - "beijing"
      - "berlin"
      - "moscow"
      - "sydney"
      - "toronto"
      - "seoul"
      - "chicago"
      - "los_angeles"
      - "singapore"
      - "bangkok"
      - "buenos_aires"
      - "shanghai"
      - "delhi"
      - "amsterdam"

  num_locations: 100
  num_val_locations: 200

evaluation:
  num_runs: 10
  time_limit: 3600  # seconds
  baselines:
    - pyvrp
    - hgs
    - lkh3
    - ortools
  significance_level: 0.05
  passmark_reference: 2277  # Intel Xeon E3-1245 v5

paths:
  data_root: "data/instances"
  checkpoint_dir: "checkpoints"
  results_dir: "reports"
  osm_cache: "data/osm_cache"
