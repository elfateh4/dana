model:
  embedding_dim: 64
  num_encoder_layers: 3
  num_heads: 4
  feedforward_dim: 128
  dropout: 0.1

training:
  batch_size: 4
  num_epochs: 3
  instances_per_epoch: 40
  learning_rate: 1.0e-3
  weight_decay: 1.0e-6
  lr_scheduler: none
  warmup_steps: 10
  max_grad_norm: 1.0
  entropy_beta: 0.01

pomo:
  num_starts: 2
  num_augmentations: 1

reward:
  alpha_response: 0.4
  beta_satisfaction: 0.3
  gamma_equity: 0.2
  delta_violation: 0.1

environment:
  max_vehicles: 3
  vehicle_capacity: 50
  time_horizon: 480
  disaster_probability: 0.0
  max_depots: 2

data:
  num_locations: 10
  num_val_locations: 20

evaluation:
  num_runs: 2
  time_limit: 60
  baselines:
    - pyvrp
  significance_level: 0.05
  passmark_reference: 2277

paths:
  data_root: "data/instances"
  checkpoint_dir: "checkpoints"
  results_dir: "reports"
